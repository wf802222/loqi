# Agent tasks — run in sequence.
# Each task is a coding instruction for the acting model.
# Loqi should surface relevant memory before the agent starts.

tasks:

  - id: task_001
    instruction: >
      Fix the function parameter naming in app.py.
      Some parameters use camelCase instead of snake_case.
    expected_memory: ["coding_rules.md::s0"]  # Naming Convention
    expected_changes: ["userId -> user_id"]

  - id: task_002
    instruction: >
      The get_user function returns None when the user is not found.
      Fix it to handle the not-found case properly.
    expected_memory: ["coding_rules.md::s1"]  # Error Handling
    expected_changes: ["raise ValueError"]

  - id: task_003
    instruction: >
      Add input validation to the add_user function.
    expected_memory: ["coding_rules.md::s2"]  # Input Validation
    expected_changes: ["validate email", "validate name", "validate role"]

  - id: task_004
    instruction: >
      Add type hints to all functions in app.py.
    expected_memory: ["coding_rules.md::s3"]  # Type Hints
    expected_changes: ["-> User", "-> list[User]", "-> None"]

  - id: task_005
    instruction: >
      Add a new function update_user that takes a user_id and
      optional keyword arguments for name, email, and role,
      and updates the matching user.
    expected_memory: ["coding_rules.md::s0", "coding_rules.md::s1", "coding_rules.md::s2", "coding_rules.md::s3"]
    expected_changes: ["def update_user", "snake_case", "type hints", "validation", "ValueError"]
    why_interesting: >
      By task 5, the agent should have learned from tasks 1-4 that
      this project requires snake_case, error handling, validation,
      and type hints. If Loqi is working, it should surface ALL FOUR
      rules before the agent writes the function — not just the ones
      semantically similar to "update user."
